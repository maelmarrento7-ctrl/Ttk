<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel EQUIPE ARGENTINA</title>
    <style>
        :root {
            --primary: #00a8ff;
            --bg-dark: #121212;
            --accent: #fbc531;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: white;
            overflow: hidden;
        }

        /* --- TELA DE LOGIN --- */
        #loginScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--bg-dark);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 20px var(--primary);
        }

        .login-box h1 { margin-bottom: 20px; font-size: 20px; color: var(--primary); }

        input {
            width: 80%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: none;
            background: #333;
            color: white;
            text-align: center;
        }

        button.login-btn {
            background: var(--primary);
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- PAINEL FLUTUANTE --- */
        #floatingPanel {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 220px;
            background: rgba(18, 18, 18, 0.95);
            border-radius: 12px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: none; /* Escondido até o login */
            z-index: 999;
            user-select: none;
        }

        .header-panel {
            background: var(--primary);
            padding: 10px;
            border-radius: 10px 10px 0 0;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-panel span { font-weight: bold; font-size: 14px; }

        .content-panel { padding: 15px; }

        .option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 13px;
        }

        /* Switch Style */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(14px); }

        .footer-panel {
            text-align: center;
            font-size: 10px;
            color: #777;
            padding-bottom: 10px;
        }

        .status-on { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>EQUIPE ARGENTINA</h1>
            <p>Acesso Restrito ao Proprietário</p>
            <input type="password" id="passInput" placeholder="Digite a Senha">
            <br>
            <button class="login-btn" onclick="checkLogin()">ENTRAR</button>
        </div>
    </div>

    <!-- PAINEL FLUTUANTE -->
    <div id="floatingPanel">
        <div class="header-panel" id="panelHeader">
            <span>EQUIPE ARGENTINA</span>
            <small onclick="minimize()" style="cursor:pointer">_</small>
        </div>
        
        <div class="content-panel" id="mainContent">
            <div class="option">
                <span>AUXÍLIO DE MIRO</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="option">
                <span>SEM TRAVAMENTO</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="option">
                <span>SEM TREMEDEIRA</span>
                <label class="switch">
                    <input type="checkbox">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div style="font-size: 10px; color: var(--accent); text-align: center;">
                STATUS: <span class="status-on">PROTEGIDO</span>
            </div>
        </div>
        
        <div class="footer-panel">V.1.0 Online</div>
    </div>

    <script>
        const SENHA_MESTRA = "123"; // Defina sua senha aqui

        function checkLogin() {
            const input = document.getElementById('passInput').value;
            if(input === SENHA_MESTRA) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('floatingPanel').style.display = 'block';
            } else {
                alert("Senha incorreta!");
            }
        }

        // Sistema para arrastar o painel
        const panel = document.getElementById("floatingPanel");
        const header = document.getElementById("panelHeader");
        let isDragging = false;
        let offset = [0,0];

        header.addEventListener('mousedown', (e) => {
            isDragging = true;
            offset = [
                panel.offsetLeft - e.clientX,
                panel.offsetTop - e.clientY
            ];
        }, true);

        document.addEventListener('mouseup', () => { isDragging = false; }, true);

        document.addEventListener('mousemove', (event) => {
            event.preventDefault();
            if (isDragging) {
                panel.style.left = (event.clientX + offset[0]) + 'px';
                panel.style.top  = (event.clientY + offset[1]) + 'px';
            }
        }, true);

        // Minimizar básico
        function minimize() {
            const content = document.getElementById('mainContent');
            content.style.display = content.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
