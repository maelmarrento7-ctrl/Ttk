<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freestyle Panel 2.0 - Demo Web</title>
  <style>
    :root {
      --bg1: #030303;
      --bg2: #0b0b0b;
      --panel: rgba(5, 5, 5, 0.92);
      --panel-2: rgba(12, 12, 12, 0.85);
      --line: rgba(255,255,255,.08);
      --line-strong: rgba(255,255,255,.16);
      --text: #f4f4f4;
      --muted: #a2a2a2;
      --accent: #14ff3c;
      --accent-2: #07d92b;
      --danger: #ff4d4d;
      --glow: 0 0 20px rgba(20,255,60,.18), 0 0 40px rgba(20,255,60,.10);
      --shadow: 0 28px 80px rgba(0,0,0,.55);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(20,255,60,.12), transparent 18%),
        radial-gradient(circle at 80% 0%, rgba(20,255,60,.09), transparent 20%),
        radial-gradient(circle at 100% 100%, rgba(20,255,60,.05), transparent 22%),
        linear-gradient(145deg, var(--bg2), var(--bg1) 45%, #070707 100%);
    }

    .scanlines::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.025),
        rgba(255,255,255,.025) 1px,
        transparent 1px,
        transparent 4px
      );
      mix-blend-mode: soft-light;
      opacity: .18;
    }

    .panel {
      position: fixed;
      top: 28px;
      left: 28px;
      width: 860px;
      max-width: calc(100vw - 24px);
      min-width: 320px;
      background: linear-gradient(180deg, rgba(14,14,14,.94), rgba(4,4,4,.96));
      border: 1px solid rgba(255,255,255,.06);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow), var(--glow);
      overflow: hidden;
      z-index: 50;
      backdrop-filter: blur(16px);
      user-select: none;
    }

    .panel.minimized {
      width: 360px;
    }
    .panel.minimized .body,
    .panel.minimized .bottom-bar { display: none; }

    .topbar {
      height: 82px;
      background: linear-gradient(180deg, #18ff43 0%, #06dc2b 100%);
      color: #101010;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px 0 22px;
      cursor: grab;
      position: relative;
      overflow: hidden;
    }

    .topbar::after {
      content: "";
      position: absolute;
      right: -40px;
      top: -34px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(0,0,0,.20), transparent 62%);
      border-radius: 50%;
    }

    .topbar:active { cursor: grabbing; }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 1;
    }

    .title-icon {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: rgba(0,0,0,.12);
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 900;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.08);
    }

    .brand {
      line-height: 1.05;
    }

    .brand .main-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: .4px;
    }

    .brand .sub-title {
      font-size: 11px;
      letter-spacing: 2.1px;
      text-transform: uppercase;
      opacity: .72;
      margin-top: 6px;
      font-weight: 800;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      z-index: 1;
    }

    .action-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      background: rgba(0,0,0,.12);
      color: #111;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease;
    }

    .action-btn:hover {
      transform: translateY(-1px) scale(1.03);
      background: rgba(0,0,0,.18);
    }

    .body {
      display: grid;
      grid-template-columns: 230px 1fr;
      min-height: 520px;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.025), transparent 32%);
      padding: 16px 14px;
    }

    .profile-box {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius: 16px;
    }

    .avatar-mini {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(180deg, #222, #090909);
      position: relative;
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
    }

    .avatar-mini::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 8px;
      transform: translateX(-50%);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ff8c8c, #930000 78%);
      box-shadow: 0 0 10px rgba(255,0,0,.18);
    }

    .avatar-mini::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      width: 20px;
      height: 16px;
      border-radius: 8px 8px 4px 4px;
      background: linear-gradient(180deg, #5b5b5b, #1a1a1a);
    }

    .profile-box strong { display: block; font-size: 14px; }
    .profile-box span { font-size: 12px; color: var(--muted); }

    .nav-list { display: grid; gap: 10px; }

    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      padding: 12px 10px;
      border-radius: 16px;
      cursor: pointer;
      transition: all .18s ease;
      text-align: left;
      font-size: 17px;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,.04);
      border-color: var(--line);
    }

    .nav-btn.active {
      background: rgba(20,255,60,.10);
      border-color: rgba(20,255,60,.26);
      box-shadow: inset 0 0 0 1px rgba(20,255,60,.08);
    }

    .nav-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #171717;
      border: 1px solid var(--line);
      flex: 0 0 auto;
      font-size: 19px;
    }

    .nav-btn.active .nav-icon {
      color: #101010;
      border-color: transparent;
      background: linear-gradient(180deg, #18ff43 0%, #06dc2b 100%);
      box-shadow: 0 0 18px rgba(20,255,60,.20);
    }

    .workspace {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.2fr .9fr;
      gap: 18px;
    }

    .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border-radius: 20px;
      padding: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(20,255,60,.10);
      border: 1px solid rgba(20,255,60,.22);
      color: #deffe4;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .headline {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 18px;
      line-height: 1.45;
    }

    .targets,
    .settings-grid,
    .opt-grid {
      display: grid;
      gap: 12px;
    }

    .pill {
      border-radius: 999px;
      padding: 16px 18px;
      font-size: 18px;
      letter-spacing: .3px;
      border: 2px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.02);
      color: var(--text);
      cursor: pointer;
      transition: .18s ease;
      text-align: center;
    }

    .pill:hover {
      border-color: rgba(255,255,255,.42);
      transform: translateX(1px);
    }

    .pill.active {
      color: #111;
      border-color: transparent;
      background: linear-gradient(180deg, #18ff43 0%, #06dc2b 100%);
      box-shadow: 0 0 18px rgba(20,255,60,.18);
      font-weight: 900;
    }

    .settings-row,
    .opt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,.025);
    }

    .settings-row strong,
    .opt-row strong { display: block; font-size: 15px; }
    .settings-row span,
    .opt-row span { display: block; font-size: 12px; color: var(--muted); margin-top: 3px; }

    .switch {
      width: 58px;
      height: 32px;
      border-radius: 999px;
      background: #2a2a2a;
      border: 1px solid rgba(255,255,255,.08);
      position: relative;
      cursor: pointer;
      transition: .2s ease;
      flex: 0 0 auto;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #d8d8d8;
      transition: .2s ease;
    }

    .switch.on {
      background: rgba(20,255,60,.22);
      border-color: rgba(20,255,60,.38);
      box-shadow: inset 0 0 0 1px rgba(20,255,60,.08), 0 0 16px rgba(20,255,60,.08);
    }

    .switch.on::after {
      left: 29px;
      background: linear-gradient(180deg, #18ff43, #06dc2b);
    }

    .preview-panel {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .scene {
      flex: 1;
      min-height: 320px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 10%, rgba(255,0,0,.88), rgba(255,0,0,.08) 16%, transparent 22%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.01));
      position: relative;
      overflow: hidden;
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 24%, rgba(20,255,60,.06), transparent 20%);
      pointer-events: none;
    }

    .crosshair {
      position: absolute;
      top: 22%;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 1px solid rgba(20,255,60,.22);
      box-shadow: inset 0 0 0 1px rgba(20,255,60,.08), 0 0 20px rgba(20,255,60,.08);
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(20,255,60,.35);
    }

    .crosshair::before {
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      width: 1px;
      height: calc(100% - 20px);
    }

    .crosshair::after {
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      height: 1px;
      width: calc(100% - 20px);
    }

    .figure {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 126px;
      height: 255px;
      filter: drop-shadow(0 12px 20px rgba(0,0,0,.7));
    }

    .head {
      width: 40px;
      height: 40px;
      margin: 0 auto 7px;
      border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, #ff9b9b, #9c0000 80%);
      box-shadow: 0 0 18px rgba(255,0,0,.25);
    }

    .torso {
      width: 84px;
      height: 96px;
      margin: 0 auto;
      clip-path: polygon(20% 0, 80% 0, 100% 16%, 88% 100%, 12% 100%, 0 16%);
      background: linear-gradient(180deg, #4c4c4c, #171717);
    }

    .arm-box,
    .leg-box {
      display: flex;
      justify-content: space-between;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .arm-box {
      width: 124px;
      top: 44px;
    }

    .leg-box {
      width: 72px;
      bottom: 0;
    }

    .arm-box span,
    .leg-box span {
      display: block;
      border-radius: 22px;
      background: linear-gradient(180deg, #575757, #1b1b1b);
    }

    .arm-box span { width: 16px; height: 98px; }
    .leg-box span { width: 20px; height: 104px; }

    .pulse-dot {
      position: absolute;
      top: 16%;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(20,255,60,.45);
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(20,255,60,.45); }
      70% { box-shadow: 0 0 0 18px rgba(20,255,60,0); }
      100% { box-shadow: 0 0 0 0 rgba(20,255,60,0); }
    }

    .meters {
      display: grid;
      gap: 12px;
    }

    .meter {
      padding: 12px 12px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.025);
      border: 1px solid var(--line);
    }

    .meter-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 8px;
      color: #ddd;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: #202020;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.05);
    }

    .fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #18ff43 0%, #06dc2b 100%);
      box-shadow: 0 0 16px rgba(20,255,60,.18);
      transition: width .35s ease;
    }

    .status-box {
      padding: 14px 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      border-radius: 16px;
      border: 1px dashed rgba(255,255,255,.10);
      background: rgba(255,255,255,.02);
    }

    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px 18px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
      font-size: 12px;
      color: var(--muted);
    }

    .chip-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: #d0d0d0;
    }

    .hotkeys {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .key {
      min-width: 34px;
      padding: 8px 10px;
      text-align: center;
      border-radius: 10px;
      border: 1px solid var(--line-strong);
      background: #131313;
      color: #f3f3f3;
      font-weight: 800;
    }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .panel { width: calc(100vw - 16px); top: 8px; left: 8px; }
      .body { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--line); }
      .workspace { grid-template-columns: 1fr; }
      .brand .main-title { font-size: 22px; }
      .topbar { height: 74px; }
    }

    @media (max-width: 520px) {
      .top-actions { gap: 8px; }
      .action-btn { width: 38px; height: 38px; }
      .brand .main-title { font-size: 18px; }
      .brand .sub-title { font-size: 9px; letter-spacing: 1.4px; }
      .workspace, .sidebar { padding: 14px; }
      .headline { font-size: 19px; }
      .pill { font-size: 16px; }
    }
  </style>
</head>
<body class="scanlines">
  <div class="panel" id="panel">
    <div class="topbar" id="dragHandle">
      <div class="title-wrap">
        <div class="title-icon">⚡</div>
        <div class="brand">
          <div class="main-title">FREESTYLE PANEL 2.0</div>
          <div class="sub-title">demo online • janela flutuante</div>
        </div>
      </div>
      <div class="top-actions">
        <button class="action-btn" id="pinBtn" title="Fixar">◎</button>
        <button class="action-btn" id="themeBtn" title="Tema">✦</button>
        <button class="action-btn" id="minBtn" title="Minimizar">—</button>
      </div>
    </div>

    <div class="body">
      <aside class="sidebar">
        <div class="profile-box">
          <div class="avatar-mini"></div>
          <div>
            <strong>Painel demo</strong>
            <span>Interface web inspirada no estilo da imagem</span>
          </div>
        </div>

        <div class="nav-list">
          <button class="nav-btn active" data-tab="principal"><span class="nav-icon">☠</span>Principal</button>
          <button class="nav-btn" data-tab="ajustes"><span class="nav-icon">⚙</span>Ajustes</button>
          <button class="nav-btn" data-tab="gelo"><span class="nav-icon">❄</span>Gelo</button>
          <button class="nav-btn" data-tab="ia"><span class="nav-icon">✦</span>IA</button>
          <button class="nav-btn" data-tab="otimizar"><span class="nav-icon">⚡</span>Otimizar</button>
        </div>
      </aside>

      <section class="workspace">
        <div>
          <div class="card tab-panel" data-panel="principal">
            <div class="tag">👤 PONTO HH</div>
            <div class="headline">Painel principal interativo</div>
            <div class="sub">Protótipo web flutuante com estilo neon, troca de abas, animação, minimização e estado visual responsivo.</div>
            <div class="targets">
              <button class="pill active" data-meter="92">CABEÇA</button>
              <button class="pill" data-meter="71">PESCOÇO</button>
              <button class="pill" data-meter="54">CORPO INTEIRO</button>
            </div>
          </div>

          <div class="card tab-panel hidden" data-panel="ajustes">
            <div class="tag">⚙ CONFIGURAÇÕES</div>
            <div class="headline">Preferências visuais</div>
            <div class="sub">Ajustes da interface web, animações e elementos de aparência apenas para demonstração visual.</div>
            <div class="settings-grid">
              <div class="settings-row">
                <div><strong>Efeito glow</strong><span>Realce neon do painel</span></div>
                <div class="switch on"></div>
              </div>
              <div class="settings-row">
                <div><strong>Scanlines</strong><span>Textura cyber na tela</span></div>
                <div class="switch on" data-scan-toggle></div>
              </div>
              <div class="settings-row">
                <div><strong>Animação de pulso</strong><span>Destaque visual no preview</span></div>
                <div class="switch on" data-pulse-toggle></div>
              </div>
            </div>
          </div>

          <div class="card tab-panel hidden" data-panel="gelo">
            <div class="tag">❄ GELO</div>
            <div class="headline">Bloco de utilidades visuais</div>
            <div class="sub">Área reservada para cards, atalhos, presets ou overlays temáticos dentro da interface web.</div>
            <div class="opt-grid">
              <div class="opt-row"><div><strong>Preset Frost</strong><span>Tema escuro com brilho frio</span></div><div class="switch"></div></div>
              <div class="opt-row"><div><strong>Modo compacto</strong><span>Reduz espaçamentos do painel</span></div><div class="switch"></div></div>
              <div class="opt-row"><div><strong>Destaque lateral</strong><span>Ênfase no menu esquerdo</span></div><div class="switch on"></div></div>
            </div>
          </div>

          <div class="card tab-panel hidden" data-panel="ia">
            <div class="tag">✦ IA</div>
            <div class="headline">Espaço para recursos inteligentes</div>
            <div class="sub">Você pode usar esta aba para recomendações, presets automáticos de layout ou resumo de status da interface.</div>
            <div class="status-box">Sugestão de próxima etapa: transformar esta demo em landing page, dashboard React ou overlay visual personalizado para stream.</div>
          </div>

          <div class="card tab-panel hidden" data-panel="otimizar">
            <div class="tag">⚡ OTIMIZAR</div>
            <div class="headline">Ações rápidas da interface</div>
            <div class="sub">Controles de aparência e comportamento do painel no navegador.</div>
            <div class="opt-grid">
              <div class="opt-row"><div><strong>Fixar posição</strong><span>Desativa o arraste temporariamente</span></div><div class="switch" data-pin-toggle></div></div>
              <div class="opt-row"><div><strong>Compactar preview</strong><span>Menor área para a cena</span></div><div class="switch" data-compact-toggle></div></div>
              <div class="opt-row"><div><strong>Tema alternativo</strong><span>Troca verde neon por ciano</span></div><div class="switch" data-theme-toggle></div></div>
            </div>
          </div>
        </div>

        <div class="preview-panel">
          <div class="card scene" id="scene">
            <div class="pulse-dot" id="pulseDot"></div>
            <div class="crosshair"></div>
            <div class="figure">
              <div class="head"></div>
              <div class="torso"></div>
              <div class="arm-box"><span></span><span></span></div>
              <div class="leg-box"><span></span><span></span></div>
            </div>
          </div>

          <div class="meters">
            <div class="meter">
              <div class="meter-top"><span>Precisão visual</span><strong id="m1txt">92%</strong></div>
              <div class="bar"><div class="fill" id="fill1" style="width:92%"></div></div>
            </div>
            <div class="meter">
              <div class="meter-top"><span>Estilo neon</span><strong>88%</strong></div>
              <div class="bar"><div class="fill" id="fill2" style="width:88%"></div></div>
            </div>
            <div class="meter">
              <div class="meter-top"><span>Responsividade</span><strong>96%</strong></div>
              <div class="bar"><div class="fill" id="fill3" style="width:96%"></div></div>
            </div>
            <div class="status-box" id="statusBox">Versão 2 carregada: painel mais moderno, com múltiplas abas, preview melhorado e interações extras.</div>
          </div>
        </div>
      </section>
    </div>

    <div class="bottom-bar">
      <div class="chip-row">
        <div class="chip">arrastável</div>
        <div class="chip">responsivo</div>
        <div class="chip">tema neon</div>
        <div class="chip">demo segura</div>
      </div>
      <div class="hotkeys">
        <div class="key">1</div>
        <div class="key">2</div>
        <div class="key">3</div>
      </div>
    </div>
  </div>

  <script>
    const panel = document.getElementById('panel');
    const dragHandle = document.getElementById('dragHandle');
    const minBtn = document.getElementById('minBtn');
    const themeBtn = document.getElementById('themeBtn');
    const pinBtn = document.getElementById('pinBtn');
    const statusBox = document.getElementById('statusBox');
    const navButtons = [...document.querySelectorAll('.nav-btn')];
    const tabPanels = [...document.querySelectorAll('.tab-panel')];
    const pills = [...document.querySelectorAll('.pill')];
    const switches = [...document.querySelectorAll('.switch')];
    const pulseDot = document.getElementById('pulseDot');
    const scene = document.getElementById('scene');
    const fill1 = document.getElementById('fill1');
    const m1txt = document.getElementById('m1txt');
    const body = document.body;

    let isDragging = false;
    let startX = 0, startY = 0, left0 = 0, top0 = 0;
    let pinned = false;
    let neonGreen = true;

    function clamp(val, min, max) {
      return Math.max(min, Math.min(val, max));
    }

    dragHandle.addEventListener('pointerdown', (e) => {
      if (pinned) return;
      if (e.target.closest('.action-btn')) return;
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      const rect = panel.getBoundingClientRect();
      left0 = rect.left;
      top0 = rect.top;
    });

    window.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      const x = left0 + (e.clientX - startX);
      const y = top0 + (e.clientY - startY);
      const maxX = window.innerWidth - panel.offsetWidth - 8;
      const maxY = window.innerHeight - panel.offsetHeight - 8;
      panel.style.left = clamp(x, 8, maxX) + 'px';
      panel.style.top = clamp(y, 8, maxY) + 'px';
    });

    window.addEventListener('pointerup', () => isDragging = false);

    minBtn.addEventListener('click', () => {
      panel.classList.toggle('minimized');
      minBtn.textContent = panel.classList.contains('minimized') ? '+' : '—';
      statusBox.textContent = panel.classList.contains('minimized')
        ? 'Painel minimizado.'
        : 'Painel restaurado.';
    });

    function setTheme(green) {
      neonGreen = green;
      const root = document.documentElement;
      if (green) {
        root.style.setProperty('--accent', '#14ff3c');
        root.style.setProperty('--accent-2', '#07d92b');
        statusBox.textContent = 'Tema verde neon ativado.';
      } else {
        root.style.setProperty('--accent', '#24ecff');
        root.style.setProperty('--accent-2', '#00bfd6');
        statusBox.textContent = 'Tema ciano ativado.';
      }

      const styles = document.getElementById('dynamicTheme') || document.createElement('style');
      styles.id = 'dynamicTheme';
      styles.textContent = green
        ? `
          .topbar,.nav-btn.active .nav-icon,.pill.active,.switch.on::after{background:linear-gradient(180deg,#18ff43 0%, #06dc2b 100%)!important;color:#111!important;}
          .tag{background:rgba(20,255,60,.10)!important;border-color:rgba(20,255,60,.22)!important;}
          .nav-btn.active,.switch.on{border-color:rgba(20,255,60,.28)!important;background:rgba(20,255,60,.10)!important;}
          .fill{background:linear-gradient(90deg,#18ff43 0%, #06dc2b 100%)!important;}
          .pulse-dot{background:#14ff3c!important;}
        `
        : `
          .topbar,.nav-btn.active .nav-icon,.pill.active,.switch.on::after{background:linear-gradient(180deg,#31f8ff 0%, #00c2da 100%)!important;color:#071114!important;}
          .tag{background:rgba(36,236,255,.10)!important;border-color:rgba(36,236,255,.22)!important;color:#e3feff!important;}
          .nav-btn.active,.switch.on{border-color:rgba(36,236,255,.30)!important;background:rgba(36,236,255,.10)!important;}
          .fill{background:linear-gradient(90deg,#31f8ff 0%, #00c2da 100%)!important;}
          .pulse-dot{background:#24ecff!important;}
        `;
      document.head.appendChild(styles);
    }

    themeBtn.addEventListener('click', () => setTheme(!neonGreen));

    pinBtn.addEventListener('click', () => {
      pinned = !pinned;
      pinBtn.textContent = pinned ? '◉' : '◎';
      statusBox.textContent = pinned
        ? 'Painel fixado na posição atual.'
        : 'Painel liberado para arrastar.';
    });

    navButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        navButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tabPanels.forEach(panel => panel.classList.toggle('hidden', panel.dataset.panel !== tab));
        statusBox.textContent = `Aba ativa: ${btn.textContent.trim()}.`;
      });
    });

    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        pills.forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        const value = pill.dataset.meter || '80';
        fill1.style.width = value + '%';
        m1txt.textContent = value + '%';
        statusBox.textContent = `Seleção visual atual: ${pill.textContent.trim()}.`;
      });
    });

    switches.forEach(sw => {
      sw.addEventListener('click', () => {
        sw.classList.toggle('on');
      });
    });

    document.querySelector('[data-scan-toggle]').addEventListener('click', (e) => {
      body.classList.toggle('scanlines');
      statusBox.textContent = body.classList.contains('scanlines')
        ? 'Textura scanlines ativada.'
        : 'Textura scanlines desativada.';
    });

    document.querySelector('[data-pulse-toggle]').addEventListener('click', () => {
      pulseDot.classList.toggle('hidden');
      statusBox.textContent = pulseDot.classList.contains('hidden')
        ? 'Pulso visual ocultado.'
        : 'Pulso visual exibido.';
    });

    document.querySelector('[data-pin-toggle]').addEventListener('click', () => {
      pinned = !pinned;
      pinBtn.textContent = pinned ? '◉' : '◎';
      statusBox.textContent = pinned
        ? 'Posição do painel travada.'
        : 'Posição do painel destravada.';
    });

    document.querySelector('[data-compact-toggle]').addEventListener('click', () => {
      const compact = scene.style.minHeight === '230px';
      scene.style.minHeight = compact ? '320px' : '230px';
      statusBox.textContent = compact ? 'Preview restaurado.' : 'Preview compactado.';
    });

    document.querySelector('[data-theme-toggle]').addEventListener('click', () => {
      setTheme(!neonGreen);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === '1') navButtons[0].click();
      if (e.key === '2') navButtons[1].click();
      if (e.key === '3') navButtons[4].click();
    });
  </script>
